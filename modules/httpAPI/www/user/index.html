<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FlapAlerted - User defined</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../src/user/user.css">
    <script type="module" src="../src/user/user.js"></script>
</head>

<body>
<div id="loading-screen">
    <div class="loader"></div>
</div>

<div class="main-container">
    <h2 id="mainHeading">FlapAlerted - User defined prefix</h2>
    <div class="error-banner d-none" id="connectionLost">
        <p>Connection lost</p>
    </div>
    <div class="error-banner d-none" id="error"></div>
    <div class="error-banner d-none" id="noBGPFeeds">
        <p>No BGP feeds are connected to this instance</p>
    </div>
    <div id="mainInfo">
        <div>
            <span id="prefix"></span>
            <a id="prefixLink" target="_blank" href="#">View paths</a>
        </div>
        <div id="totalChanges"></div>
        <div class="chartContainer">
            <canvas id="chartRouteChange"></canvas>
        </div>
        <div id="infoBox">
            <div>This prefix is only monitored as long as this tab is kept open by at least one user.</div>
            <a href="../">Back to the main page</a>
        </div>

    </div>
</div>

</body>
</html>
